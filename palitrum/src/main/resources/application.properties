# Spring Boot
spring.application.name=palitrum
server.port=8080
logging.level.org.springframework.web=DEBUG
logging.level.com.example.palitrum=DEBUG
logging.level.org.hibernate.SQL=WARN

# PostgreSQL
spring.datasource.url=jdbc:postgresql://5942e-rw.db.pub.dbaas.postgrespro.ru:5432/dbproject?stringtype=unspecified
spring.datasource.username=muzafarov_fg
spring.datasource.password=${DB_PASSWORD}
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.pool-name=PalitrumPool
spring.datasource.hikari.auto-commit=true
spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=OFF
logging.level.org.springframework.web=DEBUG
spring.jackson.time-zone=UTC
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Hibernate / JPA
spring.jpa.properties.hibernate.default_schema=muzafarov_fg
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# === PostgreSQL Dialect ===
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.schemas=muzafarov_fg
spring.flyway.default-schema=muzafarov_fg

# Yandex Cloud Object Storage (?????????? ?????????? ?????????)
yandex.cloud.access-key=${YANDEX_CLOUD_ACCESS_KEY}
yandex.cloud.secret-key=${YANDEX_CLOUD_SECRET_KEY}
yandex.cloud.endpoint=${YANDEX_CLOUD_ENDPOINT}
yandex.cloud.bucket-name=${YANDEX_CLOUD_BUCKET_NAME}
aws.s3.region=${AWS_S3_REGION}
aws.s3.path-style-access=${AWS_S3_PATH_STYLE_ACCESS}
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB